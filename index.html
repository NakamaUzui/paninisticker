<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini 2026 — Premium Grid Dashboard</title>
    <style>
        :root {
            --bg-dark: #090d14;
            --bg-card: #131a26;
            --bg-input: #1f293d;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --primary: #22c55e;
            --primary-hover: #16a34a;
            --accent-gold: #ffb703;
            --accent-red: #ef233c;
            --border: #1e293b;
            --modal-overlay: rgba(0, 0, 0, 0.85);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Sticky Header */
        .header-sticky {
            position: sticky;
            top: 0;
            background-color: rgba(9, 13, 20, 0.9);
            backdrop-filter: blur(12px);
            width: 100%;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            z-index: 900;
            padding: 15px 0;
        }

        .header-container {
            max-width: 1000px;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .stats-badge {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(34, 197, 94, 0.1);
        }

        .search-input {
            width: 100%;
            padding: 14px 18px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }

        /* Das große Länder-Grid */
        .main-content {
            max-width: 1000px;
            width: 100%;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .countries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            width: 100%;
        }

        /* Länder-Kachel-Design */
        .country-tile {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            min-height: 110px;
            box-sizing: border-box;
        }

        .country-tile:hover {
            transform: translateY(-4px);
            border-color: var(--text-muted);
            background-color: #172230;
        }

        .country-tile.has-doubles {
            border-color: rgba(34, 197, 94, 0.4);
            background: linear-gradient(145deg, var(--bg-card), #12221a);
        }

        .country-tile.has-doubles:hover {
            border-color: var(--primary);
        }

        .tile-code {
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .country-tile.has-doubles .tile-code {
            color: var(--primary);
        }

        .tile-name {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
        }

        .tile-counter {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: var(--primary);
            color: var(--bg-dark);
            font-size: 11px;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 8px;
        }

        /* MODAL / POPUP DESIGN */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-overlay);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            height: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: modalOpenAnim 0.25s ease-out;
            overflow: hidden;
        }

        @keyframes modalOpenAnim {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-card);
        }

        .modal-title {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }

        .close-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-size: 18px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background-color: var(--accent-red);
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        /* ---------------------------------------------------- */
        /* SMARTES RESPONSIVE STICKER GRID (PC VS SMARTPHONE) */
        /* ---------------------------------------------------- */
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .sticker-box {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 100px;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .sticker-box.active {
            background-color: rgba(34, 197, 94, 0.12);
            border-color: var(--primary);
            box-shadow: inset 0 0 10px rgba(34, 197, 94, 0.15);
        }

        .sticker-code {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            align-self: flex-start;
        }

        .sticker-box.active .sticker-code {
            color: var(--primary);
        }

        .sticker-name {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            margin: 6px 0;
            line-height: 1.2;
        }

        .special-type {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 2px 5px;
            border-radius: 4px;
            margin-bottom: 6px;
        }
        .type-glitzer { background-color: rgba(255, 183, 3, 0.15); color: var(--accent-gold); }
        .type-team { background-color: rgba(239, 35, 60, 0.15); color: var(--accent-red); }

        .control-row {
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: space-between;
            margin-top: auto;
            border-top: 1px solid rgba(255,255,255,0.03);
            padding-top: 8px;
        }

        .mini-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 26px;
            height: 26px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mini-btn:hover { background: rgba(255,255,255,0.15); }
        .mini-btn.plus { background-color: rgba(34, 197, 94, 0.2); border-color: var(--primary); color: var(--primary); }
        .mini-btn.plus:hover { background-color: var(--primary); color: var(--bg-dark); }

        .box-qty { font-size: 13px; font-weight: 700; color: var(--text-muted); }
        .sticker-box.active .box-qty { color: var(--text-main); font-size: 14px; }
        .no-results { text-align: center; color: var(--text-muted); padding: 40px; width: 100%; font-style: italic; }

        .modal-footer {
            display: none;
        }

        .mobile-slot-row {
            display: none;
        }

        .desktop-slot {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* ---------------------------------------------------- */
        /* MOBILE: Vollbild-Album-Grid ohne Scrollen             */
        /* ---------------------------------------------------- */
        @media (max-width: 600px) {
            html, body {
                overflow-x: hidden;
                max-width: 100%;
            }

            .modal {
                padding: 0;
                align-items: stretch;
                overflow: hidden;
                max-width: 100%;
            }

            .modal-content {
                max-width: 100%;
                width: 100%;
                max-height: 100dvh;
                height: 100dvh;
                border-radius: 0;
                border: none;
                overflow: hidden;
            }

            .modal-header {
                padding: 10px 14px;
                flex-shrink: 0;
            }

            .modal-title {
                font-size: 16px;
            }

            .close-btn {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }

            .modal-body {
                flex: 1;
                width: 100%;
                max-width: 100%;
                padding: 6px 3px;
                padding-left: max(3px, env(safe-area-inset-left, 0px));
                padding-right: max(3px, env(safe-area-inset-right, 0px));
                overflow: hidden;
                display: flex;
                flex-direction: column;
                justify-content: center;
                min-height: 0;
                min-width: 0;
                box-sizing: border-box;
            }

            .sticker-grid {
                flex: 0 1 auto;
                width: 100%;
                max-width: 100%;
                display: grid;
                --grid-gap: 4px;
                gap: var(--grid-gap);
                grid-template-columns: repeat(5, calc((100% - (4 * var(--grid-gap))) / 5));
                grid-template-rows: repeat(4, auto);
                align-content: center;
                min-height: 0;
                min-width: 0;
                box-sizing: border-box;
                overflow: hidden;
            }

            .sticker-grid.grid-fwc {
                grid-template-rows: repeat(4, auto);
            }

            .sticker-grid.grid-panini {
                grid-template-columns: minmax(0, 120px);
                grid-template-rows: auto;
                justify-content: center;
                margin: 0 auto;
                width: 100%;
            }

            .sticker-box {
                min-width: 0;
                min-height: 0;
                max-width: 100%;
                width: 100%;
                height: auto;
                aspect-ratio: 1.05 / 1;
                padding: 4px 2px;
                border-radius: 7px;
                border-width: 1px;
                justify-content: center;
                align-items: center;
                position: relative;
                background: rgba(255, 255, 255, 0.03);
                border-color: rgba(255, 255, 255, 0.06);
                box-sizing: border-box;
                overflow: hidden;
                cursor: default;
                -webkit-tap-highlight-color: transparent;
            }

            .sticker-box.active {
                background: rgba(34, 197, 94, 0.18);
                border-color: var(--primary);
                box-shadow: inset 0 0 0 1px rgba(34, 197, 94, 0.35);
            }

            .desktop-slot {
                display: none;
            }

            .mobile-slot {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 100%;
                max-width: 100%;
                min-width: 0;
                padding: 0 1px;
                gap: 3px;
                box-sizing: border-box;
            }

            .mobile-slot-row {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 4px;
                width: 100%;
                max-width: 100%;
                min-width: 0;
            }

            .slot-btn {
                width: 17px;
                height: 17px;
                padding: 0;
                border: 1px solid var(--border);
                border-radius: 4px;
                background: rgba(255, 255, 255, 0.06);
                color: var(--text-muted);
                font-size: 11px;
                font-weight: 700;
                line-height: 1;
                cursor: pointer;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                -webkit-tap-highlight-color: transparent;
            }

            .slot-btn.plus {
                background: rgba(34, 197, 94, 0.15);
                border-color: rgba(34, 197, 94, 0.45);
                color: var(--primary);
            }

            .slot-btn:active {
                transform: scale(0.9);
                opacity: 0.85;
            }

            .slot-num {
                font-size: clamp(13px, 3.5vw, 16px);
                font-weight: 800;
                color: var(--text-muted);
                line-height: 1;
                min-width: 0;
                width: 1.2em;
                flex: 0 0 auto;
                text-align: center;
                padding: 0 1px;
            }

            .sticker-box.active .slot-num {
                color: var(--primary);
            }

            .slot-name {
                font-size: clamp(7px, 2.15vw, 9px);
                font-weight: 600;
                color: rgba(248, 250, 252, 0.55);
                text-align: center;
                line-height: 1.15;
                width: 100%;
                max-width: 100%;
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                padding: 0 2px;
                box-sizing: border-box;
            }

            .sticker-box.active .slot-name {
                color: rgba(248, 250, 252, 0.85);
            }

            .sticker-box[data-special="glitzer"]::before,
            .sticker-box[data-special="team"]::before {
                position: absolute;
                top: 3px;
                left: 4px;
                font-size: 9px;
                line-height: 1;
                opacity: 0.9;
                pointer-events: none;
            }

            .sticker-box[data-special="glitzer"]::before {
                content: '✨';
            }

            .sticker-box[data-special="team"]::before {
                content: '👥';
            }

            .sticker-box.active::after {
                content: attr(data-qty);
                position: absolute;
                top: 2px;
                right: 2px;
                min-width: 13px;
                height: 13px;
                padding: 0 2px;
                background: var(--primary);
                color: var(--bg-dark);
                font-size: 8px;
                font-weight: 900;
                border-radius: 999px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-sizing: border-box;
            }

            .sticker-box:not(.active)::after {
                display: none;
            }

            .modal-footer {
                display: flex;
                flex-shrink: 0;
                justify-content: center;
                align-items: center;
                padding: 8px 14px calc(10px + env(safe-area-inset-bottom, 0px));
                border-top: 1px solid var(--border);
                background: var(--bg-card);
                font-size: 12px;
            }

            .modal-team-total {
                font-weight: 700;
                color: var(--primary);
            }
        }
    </style>
</head>

        function getStickerName(category, num) {
            if (scaniniDatabase[category] && scaniniDatabase[category][num]) {
                return scaniniDatabase[category][num];
            }
            return `Sticker ${num}`;
        }

        function getTrackedCount(category) {
            let numbers = [];
            if (category === 'PANINI') numbers = ["00"];
            else if (category === 'FWC') {
                for (let i = 1; i <= 19; i++) numbers.push(i.toString());
            } else {
                for (let i = 1; i <= 20; i++) numbers.push(i.toString());
            }

            return numbers.reduce((sum, num) => {
                return sum + (quantities[`${category}_${num}`] || 0);
            }, 0);
        }

        function renderDashboard() {
            const gridContainer = document.getElementById('countriesGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            gridContainer.innerHTML = '';
            
            let totalDoublesGlobal = 0;
            let tilesRendered = 0;

            albumOrder.forEach(category => {
                let numbers = [];
                if (category === 'PANINI') numbers = ["00"];
                else if (category === 'FWC') { for(let i=1; i<=19; i++) numbers.push(i.toString()); }
                else { for(let i=1; i<=20; i++) numbers.push(i.toString()); }

                let showTile = false;
                let teamDoubles = getTrackedCount(category);

                numbers.forEach(num => {
                    const name = getStickerName(category, num);
                    const qty = quantities[`${category}_${num}`] || 0;
                    totalDoublesGlobal += qty;
                    
                    const labelName = categoryLabels[category] ? categoryLabels[category].toLowerCase() : '';
                    if (category.toLowerCase().includes(searchTerm) || 
                        num.includes(searchTerm) || 
                        name.toLowerCase().includes(searchTerm) ||
                        labelName.includes(searchTerm)) {
                        showTile = true;
                    }
                });

                if (showTile) {
                    tilesRendered++;
                    const tile = document.createElement('div');
                    tile.className = `country-tile ${teamDoubles > 0 ? 'has-doubles' : ''}`;
                    tile.onclick = () => openModal(category);

                    tile.innerHTML = `
                        <div class="tile-code">${category}</div>
                        <div class="tile-name">${categoryLabels[category] || category}</div>
                    `;

                    if (teamDoubles > 0) {
                        const counter = document.createElement('div');
                        counter.className = 'tile-counter';
                        counter.textContent = teamDoubles;
                        tile.appendChild(counter);
                    }

                    gridContainer.appendChild(tile);
                }
            });

            document.getElementById('totalCounter').textContent = `${totalDoublesGlobal} Doppelte gesamt`;

            if (tilesRendered === 0) {
                gridContainer.innerHTML = '<div class="no-results">Keine passenden Länder oder Spieler gefunden.</div>';
            }

            localStorage.setItem('paniniPremiumQty', JSON.stringify(quantities));
        }

        function openModal(category) {
            activeCategory = category;
            document.getElementById('modalTitle').textContent = `${categoryLabels[category] || category} (${category})`;
            
            const grid = document.getElementById('modalStickerGrid');
            grid.innerHTML = '';
            grid.className = 'sticker-grid';
            if (category === 'PANINI') grid.classList.add('grid-panini');
            else if (category === 'FWC') grid.classList.add('grid-fwc');

            let numbers = [];
            if (category === 'PANINI') numbers = ["00"];
            else if (category === 'FWC') { for(let i=1; i<=19; i++) numbers.push(i.toString()); }
            else { for(let i=1; i<=20; i++) numbers.push(i.toString()); }

            let teamTotal = 0;

            numbers.forEach(num => {
                const name = getStickerName(category, num);
                const qty = quantities[`${category}_${num}`] || 0;
                teamTotal += qty;

                const box = document.createElement('div');
                box.className = `sticker-box ${qty > 0 ? 'active' : ''}`;
                box.setAttribute('data-qty', qty);

                let subTag = '';
                let special = '';
                if (category === 'PANINI' || category === 'FWC' || num === "1") {
                    subTag = '<span class="special-type type-glitzer">✨ Glitzer</span>';
                    special = 'glitzer';
                } else if (num === "13") {
                    subTag = '<span class="special-type type-team">👥 Team</span>';
                    special = 'team';
                }
                if (special) box.setAttribute('data-special', special);

                box.innerHTML = `
                    <div class="mobile-slot">
                        <div class="mobile-slot-row">
                            <button type="button" class="slot-btn" onclick="event.stopPropagation(); handleBoxClick('${category}', '${num}', -1)">−</button>
                            <span class="slot-num">${num}</span>
                            <button type="button" class="slot-btn plus" onclick="event.stopPropagation(); handleBoxClick('${category}', '${num}', 1)">+</button>
                        </div>
                        <div class="slot-name">${name}</div>
                    </div>
                    <div class="desktop-slot">
                        <div class="sticker-code">${num}</div>
                        <div class="sticker-name">${name}</div>
                        ${subTag}
                        <div class="control-row">
                            <button class="mini-btn" onclick="event.stopPropagation(); handleBoxClick('${category}', '${num}', -1)">-</button>
                            <span class="box-qty">${qty}</span>
                            <button class="mini-btn plus" onclick="event.stopPropagation(); handleBoxClick('${category}', '${num}', 1)">+</button>
                        </div>
                    </div>
                `;

                if (!window.matchMedia('(max-width: 600px)').matches) {
                    box.onclick = () => handleBoxClick(category, num, 1);
                }

                grid.appendChild(box);
            });

            const teamTotalEl = document.getElementById('modalTeamTotal');
            if (teamTotalEl) {
                teamTotalEl.textContent = teamTotal > 0 ? `${teamTotal} Doppelte` : '';
            }

            document.getElementById('stickerModal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('stickerModal').classList.remove('open');
            activeCategory = null;
            renderDashboard();
        }

        function handleBoxClick(category, number, change) {
            const key = `${category}_${number}`;
            let currentQty = quantities[key] || 0;
            currentQty += change;

            if (currentQty <= 0) delete quantities[key];
            else quantities[key] = currentQty;

            // Sofortiges Update des geöffneten Modals
            openModal(category);
        }

        // Start auslösen
        renderDashboard();
