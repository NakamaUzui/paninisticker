<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini 2026 — Premium Tausch-Dashboard</title>
    <style>
        :root {
            --bg-dark: #0f141c;
            --bg-card: #1a222d;
            --bg-input: #242f3d;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #22c55e;
            --primary-hover: #16a34a;
            --accent-gold: #ffb703;
            --accent-red: #ef233c;
            --border: #2d3a4b;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-sticky {
            position: sticky;
            top: 0;
            background-color: rgba(15, 20, 28, 0.9);
            backdrop-filter: blur(10px);
            width: 100%;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 15px 0;
        }

        .header-container {
            max-width: 900px;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-badge {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        }

        .main-content {
            max-width: 900px;
            width: 100%;
            padding: 25px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .team-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }

        .team-card.has-active-doubles {
            border-color: rgba(34, 197, 94, 0.4);
        }

        .team-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            background-color: rgba(255,255,255,0.01);
            transition: background 0.2s;
        }

        .team-header:hover {
            background-color: rgba(255,255,255,0.03);
        }

        .team-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-badge-count {
            background-color: var(--primary);
            color: var(--bg-dark);
            font-size: 11px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .arrow-icon {
            font-size: 14px;
            color: var(--text-muted);
            transition: transform 0.3s;
        }

        .team-card.open .arrow-icon {
            transform: rotate(180deg);
        }

        .team-content {
            display: none;
            padding: 20px;
            border-top: 1px solid var(--border);
            background-color: rgba(0,0,0,0.1);
        }

        .team-card.open .team-content {
            display: block;
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .sticker-box {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 90px;
            position: relative;
            transition: all 0.2s;
        }

        .sticker-box.active {
            background-color: rgba(34, 197, 94, 0.08);
            border-color: var(--primary);
            box-shadow: inset 0 0 10px rgba(34, 197, 94, 0.1);
        }

        .sticker-code {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            align-self: flex-start;
        }

        .sticker-box.active .sticker-code {
            color: var(--primary);
        }

        .sticker-name {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            margin: 6px 0;
            word-break: break-word;
            line-height: 1.2;
        }

        .special-type {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 1px 4px;
            border-radius: 4px;
            margin-top: 2px;
        }
        .type-glitzer { background-color: rgba(255, 183, 3, 0.15); color: var(--accent-gold); }
        .type-team { background-color: rgba(239, 35, 60, 0.15); color: var(--accent-red); }

        .control-row {
            display: flex;
            align-items: center;
            width: 100%;
            justify-content: space-between;
            margin-top: auto;
            border-top: 1px solid rgba(255,255,255,0.03);
            padding-top: 6px;
        }

        .mini-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s;
        }

        .mini-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .mini-btn.plus {
            background-color: rgba(34, 197, 94, 0.2);
            border-color: var(--primary);
            color: var(--primary);
        }

        .mini-btn.plus:hover {
            background-color: var(--primary);
            color: var(--bg-dark);
        }

        .box-qty {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .sticker-box.active .box-qty {
            color: var(--text-main);
            font-size: 14px;
        }

        .no-results {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-style: italic;
        }
    </style>
</head>

            "COD_7": 1, "COD_9": 1, "COD_10": 1, "COD_11": 1, "COD_12": 1, "COD_16": 2, "UZB_3": 1, "UZB_5": 1, "UZB_7": 3, "UZB_10": 3, "UZB_13": 1, "UZB_14": 1, "UZB_17": 1, "UZB_18": 1, "COL_4": 3, "COL_9": 1, "COL_11": 1, "COL_18": 1,
            "ENG_13": 1, "ENG_14": 1, "ENG_16": 1, "CRO_1": 1, "CRO_3": 1, "CRO_15": 1, "CRO_18": 1, "GHA_9": 3, "GHA_13": 1, "PAN_1": 1, "PAN_2": 2, "PAN_11": 2, "PAN_17": 1
        };

        // Lade gespeicherte Mengen oder nimm die Start-Liste
        let quantities = JSON.parse(localStorage.getItem('paniniPremiumQty'));
        if (!quantities || Object.keys(quantities).length === 0) {
            quantities = initialQuantities;
        }
        
        let openCards = JSON.parse(localStorage.getItem('paniniOpenCards')) || { "PANINI": true, "FWC": true };

        function getStickerName(category, number) {
            if (scaniniDatabase[category] && scaniniDatabase[category][number]) {
                return scaniniDatabase[category][number];
            }
            if (parseInt(number) === 1) return "Team Logo";
            if (parseInt(number) === 13) return "Team Photo";
            return `Spieler Nr. ${number}`;
        }

        function renderDashboard() {
            const container = document.getElementById('dashboardContent');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';
            
            let totalDoublesGlobal = 0;
            let cardsRendered = 0;

            albumOrder.forEach(category => {
                let numbers = [];
                if (category === 'PANINI') numbers = ["00"];
                else if (category === 'FWC') { for(let i=1; i<=19; i++) numbers.push(i.toString()); }
                else { for(let i=1; i<=20; i++) numbers.push(i.toString()); }

                let matchedStickers = [];
                let teamDoublesCount = 0;

                numbers.forEach(num => {
                    const name = getStickerName(category, num);
                    const qty = quantities[`${category}_${num}`] || 0;
                    totalDoublesGlobal += qty;
                    teamDoublesCount += qty;

                    const matchesSearch = category.toLowerCase().includes(searchTerm) || 
                                          num.includes(searchTerm) || 
                                          name.toLowerCase().includes(searchTerm) ||
                                          (categoryLabels[category] && categoryLabels[category].toLowerCase().includes(searchTerm));

                    if (!searchTerm || matchesSearch) {
                        matchedStickers.push({ num, name, qty });
                    }
                });

                if (matchedStickers.length > 0) {
                    cardsRendered++;
                    const isCardOpen = openCards[category] || searchTerm.length > 0;

                    const card = document.createElement('div');
                    card.className = `team-card ${teamDoublesCount > 0 ? 'has-active-doubles' : ''} ${isCardOpen ? 'open' : ''}`;
                    
                    const header = document.createElement('div');
                    header.className = 'team-header';
                    header.onclick = () => toggleCard(category);

                    header.innerHTML = `
                        <div class="team-title">
                            <span>${categoryLabels[category] || category}</span>
                            <span class="team-badge-count" style="display: ${teamDoublesCount > 0 ? 'inline-block' : 'none'}">${teamDoublesCount}</span>
                        </div>
                        <div class="arrow-icon">▼</div>
                    `;

                    const content = document.createElement('div');
                    content.className = 'team-content';

                    const grid = document.createElement('div');
                    grid.className = 'sticker-grid';

                    matchedStickers.forEach(sticker => {
                        const box = document.createElement('div');
                        box.className = `sticker-box ${sticker.qty > 0 ? 'active' : ''}`;

                        let subTag = '';
                        if (category === 'PANINI' || category === 'FWC' || sticker.num === "1") {
                            subTag = '<span class="special-type type-glitzer">✨ Glitzer</span>';
                        } else if (sticker.num === "13") {
                            subTag = '<span class="special-type type-team">👥 Team</span>';
                        }

                        box.innerHTML = `
                            <div class="sticker-code">${category} ${sticker.num}</div>
                            <div class="sticker-name">${sticker.name}</div>
                            ${subTag}
                            <div class="control-row">
                                <button class="mini-btn" onclick="event.stopPropagation(); changeQty('${category}', '${sticker.num}', -1)">-</button>
                                <span class="box-qty">${sticker.qty}</span>
                                <button class="mini-btn plus" onclick="event.stopPropagation(); changeQty('${category}', '${sticker.num}', 1)">+</button>
                            </div>
                        `;
                        grid.appendChild(box);
                    });

                    content.appendChild(grid);
                    card.appendChild(header);
                    card.appendChild(content);
                    container.appendChild(card);
                }
            });

            document.getElementById('totalCounter').textContent = `${totalDoublesGlobal} Doppelte gesamt`;

            if (cardsRendered === 0) {
                container.innerHTML = '<div class="no-results">Keine passenden Sticker oder Länder gefunden.</div>';
            }

            localStorage.setItem('paniniPremiumQty', JSON.stringify(quantities));
        }

        function toggleCard(category) {
            if (openCards[category]) {
                delete openCards[category];
            } else {
                openCards[category] = true;
            }
            localStorage.setItem('paniniOpenCards', JSON.stringify(openCards));
            renderDashboard();
        }

        function changeQty(category, number, change) {
            const key = `${category}_${number}`;
            let currentQty = quantities[key] || 0;
            currentQty += change;

            if (currentQty <= 0) delete quantities[key];
            else quantities[key] = currentQty;

            renderDashboard();
        }

        renderDashboard();
    </script>
</body>
</html>
